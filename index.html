<!DOCTYPE html>
<html>
<head>
  <title>Grant Mini Browser</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    .toolbar {
      display: flex;
      padding: 10px;
      background: #222;
      gap: 8px;
    }

    .toolbar input {
      flex: 1;
      padding: 8px;
      font-size: 14px;
      border-radius: 4px;
      border: none;
    }

    .toolbar button {
      padding: 8px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      background: #4CAF50;
      color: white;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 50px);
      border: none;
      background: white;
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <button onclick="goBack()">⬅</button>
    <button onclick="goForward()">➡</button>
    <input type="text" id="urlInput" placeholder="Enter full URL (https://example.com)">
    <button onclick="loadSite()">Go</button>
  </div>

  <iframe id="browserFrame"></iframe>

  <script>
    const frame = document.getElementById("browserFrame");

    function loadSite() {
      let url = document.getElementById("urlInput").value.trim();

      if (!url.startsWith("http")) {
        url = "https://" + url;
      }

      frame.src = url;
    }

    function goBack() {
      frame.contentWindow.history.back();
    }

    function goForward() {
      frame.contentWindow.history.forward();
    }
  </script>

</body>
</html>
